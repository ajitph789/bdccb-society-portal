<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>BDCCB Society — Admin Panel</title>
<style>
:root{
  --navy:#0a2342;--navy2:#163258;--navy3:#1a4a7a;
  --gold:#c9941a;--gold2:#e4a820;--gold3:#f5c842;--goldp:#fffbec;
  --teal:#065f46;--teal2:#047857;--teal3:#10b981;--tealp:#ecfdf5;
  --red:#b91c1c;--redbg:#fef2f2;--redfg:#dc2626;
  --blue:#1d4ed8;--bluebg:#eff6ff;
  --purple:#7c3aed;--purplebg:#f5f3ff;
  --green:#065f46;--greenbg:#ecfdf5;
  --orange:#c2410c;--orangebg:#fff7ed;
  --bg:#f0f4f9;--card:#fff;--border:#dde4ef;
  --ink:#0d1f3c;--muted:#5a6b84;--sub:#8899b0;
  --sh:0 1px 4px rgba(13,31,60,.07);
  --sh2:0 4px 18px rgba(13,31,60,.11);
  --r:14px;--r2:10px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100dvh;overflow-x:hidden}
.screen{display:none!important}
.screen.on{display:flex!important;flex-direction:column;min-height:100dvh}
#loginScreen.on{align-items:center;justify-content:center;background:linear-gradient(160deg,#0a2342,#1a4a7a,#065f46)}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LOGIN ── */
.login-card{
  background:#fff;border-radius:24px;width:calc(100% - 40px);max-width:400px;
  box-shadow:0 40px 100px rgba(0,0,0,.5);animation:fadeUp .5s ease;overflow:hidden;
}
.login-top{
  background:linear-gradient(135deg,var(--navy),var(--navy3));
  padding:36px 28px 28px;text-align:center;position:relative;
}
.login-top::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold3),var(--gold2))}
.login-ico{width:72px;height:72px;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.2);border-radius:20px;font-size:34px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.login-title{font-size:17px;font-weight:800;color:#fff;margin-bottom:4px}
.login-sub{font-size:10px;color:rgba(255,255,255,.45);font-weight:600;text-transform:uppercase;letter-spacing:.1em}
.admin-badge{display:inline-block;background:rgba(245,200,66,.15);border:1px solid rgba(245,200,66,.3);border-radius:6px;padding:4px 12px;font-size:11px;font-weight:700;color:var(--gold3);margin-top:10px}
.login-body{padding:28px}
.fld{margin-bottom:16px}
.fld label{display:block;font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.inp-wrap{position:relative}
.inp-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.inp{width:100%;border:2px solid var(--border);border-radius:12px;padding:13px 14px 13px 42px;font-family:var(--font);font-size:14px;font-weight:600;color:var(--ink);background:#f8fafc;outline:none;transition:.15s}
.inp:focus{border-color:var(--gold2);box-shadow:0 0 0 3px rgba(201,148,26,.1);background:#fff}
.inp::placeholder{font-size:13px;font-weight:400;color:#94a3b8}
.login-btn{width:100%;background:linear-gradient(135deg,var(--navy),var(--navy3));color:#fff;border:none;border-radius:12px;padding:15px;font-family:var(--font);font-size:14px;font-weight:800;cursor:pointer;margin-top:4px;box-shadow:0 4px 14px rgba(10,35,66,.3);transition:.2s}
.login-btn:active{transform:scale(.98)}
.login-err{background:var(--redbg);border:1.5px solid #fecaca;border-radius:10px;padding:11px 14px;font-size:12px;color:var(--redfg);font-weight:700;text-align:center;margin-top:12px;display:none}

/* ── APP SHELL ── */
.app-header{
  background:linear-gradient(135deg,var(--navy),var(--navy2),var(--teal));
  padding:11px 16px;border-bottom:3px solid var(--gold3);
  box-shadow:0 2px 20px rgba(0,0,0,.3);position:sticky;top:0;z-index:200;flex-shrink:0;
}
.app-hinner{display:flex;align-items:center;justify-content:space-between;gap:8px}
.app-htitle{display:flex;align-items:center;gap:10px}
.app-hico{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gold3));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.app-htext h1{font-size:14px;font-weight:800;color:#fff}
.app-htext p{font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em}
.hbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.8);border-radius:9px;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)}
.hbtn.danger{background:rgba(220,38,38,.15);border-color:rgba(220,38,38,.25);color:#fca5a5}

/* TAB BAR */
.tab-bar{background:linear-gradient(135deg,#061228,var(--navy));border-bottom:1px solid rgba(201,148,26,.2);position:sticky;top:59px;z-index:199;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tab-bar::-webkit-scrollbar{display:none}
.tab-inner{display:flex;padding:0 8px;min-width:max-content}
.tbtn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 14px 8px;border:none;background:none;color:rgba(255,255,255,.4);font-family:var(--font);font-size:9.5px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;transition:.15s;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
.tbtn .tico{font-size:18px}
.tbtn.on{color:var(--gold3);border-bottom-color:var(--gold3)}

.page-content{flex:1;padding:16px;padding-bottom:40px}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh2);overflow:hidden;margin-bottom:14px}
.sec-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:16px 0 10px}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.stat-box{background:#fff;border-radius:var(--r2);padding:14px;box-shadow:var(--sh);border-left:4px solid transparent}
.stat-box.blue{border-color:var(--blue)}
.stat-box.teal{border-color:var(--teal)}
.stat-box.gold{border-color:var(--gold)}
.stat-box.red{border-color:var(--red)}
.stat-ico{font-size:22px;margin-bottom:6px}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.stat-num{font-size:20px;font-weight:900;color:var(--ink)}
.stat-sub{font-size:10.5px;color:var(--sub);margin-top:3px}

/* ── SEARCH BAR ── */
.search-bar{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:11px 14px 11px 40px;font-family:var(--font);font-size:14px;color:var(--ink);outline:none;width:100%;margin-bottom:12px;position:relative}
.search-wrap{position:relative;margin-bottom:12px}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.search-bar:focus{border-color:var(--navy2)}

/* ── EMPLOYEE LIST ── */
.emp-card{background:#fff;border-radius:var(--r2);box-shadow:var(--sh);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.emp-avatar{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--navy),var(--navy3));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.emp-info{flex:1;min-width:0}
.emp-name{font-size:14px;font-weight:700;color:var(--ink)}
.emp-code{font-size:11px;color:var(--muted);font-family:monospace;margin-top:2px}
.emp-branch{font-size:11px;color:var(--teal);font-weight:600;margin-top:3px}
.emp-actions{display:flex;gap:6px;flex-shrink:0}
.btn-icon{width:34px;height:34px;border-radius:9px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:.15s}
.btn-icon.edit{background:var(--bluebg);color:var(--blue)}
.btn-icon.del{background:var(--redbg);color:var(--redfg)}
.btn-icon:active{transform:scale(.92)}

/* ── FORM ── */
.form-card{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--sh2);margin-bottom:14px}
.form-title{font-size:15px;font-weight:800;color:var(--ink);margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{margin-bottom:14px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}
.form-inp{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;font-family:var(--font);font-size:13px;color:var(--ink);outline:none;transition:.15s;background:#f8fafc}
.form-inp:focus{border-color:var(--navy2);background:#fff}
.form-inp::placeholder{color:#94a3b8}
select.form-inp{cursor:pointer}
.btn-primary{background:linear-gradient(135deg,var(--navy),var(--navy3));color:#fff;border:none;border-radius:10px;padding:12px 22px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(10,35,66,.25);transition:.2s}
.btn-primary:active{transform:scale(.97)}
.btn-secondary{background:#fff;color:var(--ink);border:1.5px solid var(--border);border-radius:10px;padding:12px 22px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.btn-secondary:hover{border-color:var(--navy);color:var(--navy)}
.btn-danger{background:var(--redbg);color:var(--redfg);border:1.5px solid rgba(220,38,38,.2);border-radius:10px;padding:12px 22px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer}
.btn-teal{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#fff;border:none;border-radius:10px;padding:12px 22px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(6,95,70,.25)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}

/* ── MONTHLY ENTRY ── */
.month-table{width:100%;border-collapse:collapse;font-size:12px}
.month-table th{background:var(--navy);color:rgba(255,255,255,.7);padding:10px 8px;text-align:center;font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;white-space:nowrap}
.month-table th:first-child{text-align:left;padding-left:12px}
.month-table td{padding:8px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
.month-table tr:nth-child(even) td{background:#f8fafc}
.month-inp{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:6px 8px;font-family:var(--font);font-size:12px;color:var(--ink);outline:none;text-align:right;background:#fff;min-width:70px}
.month-inp:focus{border-color:var(--navy2)}
.emp-name-cell{font-size:12px;font-weight:700;color:var(--ink);padding-left:12px;white-space:nowrap}
.emp-code-cell{font-size:10px;color:var(--muted);font-family:monospace}

/* ── NOTICES ── */
.notice-item{background:#fff;border-radius:var(--r2);padding:14px 16px;margin-bottom:10px;box-shadow:var(--sh);border-left:4px solid var(--border);position:relative}
.notice-item.pinned{border-left-color:var(--gold2);background:var(--goldp)}
.notice-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
.notice-title-txt{font-size:13px;font-weight:800;color:var(--ink)}
.notice-actions{display:flex;gap:6px;flex-shrink:0}
.notice-body-txt{font-size:12px;color:var(--muted);line-height:1.6}
.notice-meta{font-size:10.5px;color:var(--sub);margin-top:8px}
.pin-btn{background:var(--goldp);border:1px solid rgba(201,148,26,.25);border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--gold);cursor:pointer}
.pin-btn.active{background:var(--gold2);color:#fff;border-color:var(--gold2)}

/* ── WHATSAPP / BROADCAST ── */
.wa-emp-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border-radius:10px;margin-bottom:8px;box-shadow:var(--sh)}
.wa-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:.15s}
.wa-check.checked{background:var(--teal);border-color:var(--teal);color:#fff}
.wa-info{flex:1;min-width:0}
.wa-name{font-size:13px;font-weight:700;color:var(--ink)}
.wa-phone{font-size:11px;color:var(--muted);margin-top:2px}
.wa-bottom-bar{position:sticky;bottom:0;background:var(--card);border-top:1px solid var(--border);padding:14px 16px;display:flex;gap:10px;align-items:center;margin-top:14px}
.wa-count{font-size:13px;font-weight:700;color:var(--ink);flex:1}
.select-all-btn{background:var(--bluebg);color:var(--blue);border:1.5px solid rgba(29,78,216,.2);border-radius:9px;padding:8px 14px;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer}
.send-wa-btn{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;border:none;border-radius:10px;padding:11px 20px;font-family:var(--font);font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(37,211,102,.35)}

/* ── BROADCAST ── */
.broadcast-type{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.btype-btn{background:#fff;border:2px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:.15s;font-size:20px}
.btype-btn span{display:block;font-size:10px;font-weight:700;color:var(--muted);margin-top:4px}
.btype-btn.on{border-color:var(--navy);background:var(--navy);color:#fff}
.btype-btn.on span{color:rgba(255,255,255,.7)}
.msg-templates{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.tmpl-btn{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:var(--font);font-size:12px;font-weight:600;color:var(--ink);cursor:pointer;text-align:left;transition:.15s}
.tmpl-btn:hover{border-color:var(--navy);color:var(--navy);background:#f0f4f9}
.msg-area{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:13px;font-family:var(--font);font-size:13px;color:var(--ink);outline:none;resize:vertical;min-height:120px;background:#f8fafc;margin-bottom:12px}
.msg-area:focus{border-color:var(--navy);background:#fff}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:24px 20px 36px;animation:fadeUp .3s ease}
.modal-title{font-size:17px;font-weight:800;color:var(--ink);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:var(--border);border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;border-radius:12px;padding:11px 20px;font-size:13px;font-weight:700;opacity:0;transition:.25s;z-index:999;white-space:nowrap;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--teal)}
.toast.err{background:var(--red)}

.empty{text-align:center;padding:40px 20px}
.empty-ico{font-size:44px;margin-bottom:10px}
.empty-txt{font-size:14px;color:var(--muted);font-weight:600}

.loader{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
</style>
</head>
<body>

<!-- ═══════ LOGIN ═══════ -->
<div class="screen on" id="loginScreen">
  <div class="login-card">
    <div class="login-top">
      <div class="login-ico">🏦</div>
      <div class="login-title">BDCCB Employee Society</div>
      <div class="login-sub">Bagalkot DCC Bank Ltd.</div>
      <div class="admin-badge">⚙️ Admin Panel</div>
    </div>
    <div class="login-body">
      <div class="fld">
        <label>Admin Password</label>
        <div class="inp-wrap">
          <span class="inp-ico">🔑</span>
          <input class="inp" id="adminPass" type="password" placeholder="Enter admin password"
            onkeydown="if(event.key==='Enter')doAdminLogin()">
        </div>
      </div>
      <button class="login-btn" onclick="doAdminLogin()">Login as Admin →</button>
      <div class="login-err" id="loginErr">❌ Wrong password. Please try again.</div>
    </div>
  </div>
</div>

<!-- ═══════ APP ═══════ -->
<div class="screen" id="appScreen">
  <div class="app-header">
    <div class="app-hinner">
      <div class="app-htitle">
        <div class="app-hico">⚙️</div>
        <div class="app-htext">
          <h1>Admin Panel</h1>
          <p>BDCCB Employee Society</p>
        </div>
      </div>
      <button class="hbtn danger" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab-inner" id="tabInner"></div>
  </div>
  <div class="page-content" id="pageContent"></div>
</div>

<!-- ═══════ MODAL ═══════ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-title">
      <span id="modalTitle">—</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbw9CafvWtWUjl6Q8YaUor5Wa3M159gex294Fm4qIz-YwtRah_Ztf8KG5xHp3s8POQI3/exec';
const APP_VERSION = 3.0;
const ADMIN_PASSWORD_KEY = 'admin_password'; // key in Config sheet

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let ALL_EMPLOYEES = [];
let ALL_NOTICES   = [];
let curTab = '';
let editingEmp = null; // for edit modal
let selectedWA = new Set(); // for whatsapp
let broadcastMsg = '';

// ═══════════════════════════════════════════
// API
// ═══════════════════════════════════════════
async function apiCall(action, extraData = {}) {
  const body = JSON.stringify({ action, version: APP_VERSION, ...extraData });
  try {
    const res = await fetch(API_URL, { method:'POST', redirect:'follow', body });
    const json = JSON.parse(await res.text());
    if (json && json.ok !== undefined) return json;
  } catch(e1) {}
  try {
    const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(API_URL), { method:'POST', body });
    const json = JSON.parse(await res.text());
    if (json && json.ok !== undefined) return json;
  } catch(e2) {}
  return { ok: false, error: 'network_error' };
}

// ═══════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════
async function doAdminLogin() {
  const pass = document.getElementById('adminPass').value.trim();
  if (!pass) return;
  const btn = document.querySelector('.login-btn');
  btn.innerHTML = '<span class="loader"></span>Verifying…'; btn.disabled = true;

  const res = await apiCall('adminLogin', { password: pass });
  btn.innerHTML = 'Login as Admin →'; btn.disabled = false;

  if (res.ok) {
    document.getElementById('loginScreen').classList.remove('on');
    document.getElementById('appScreen').classList.add('on');
    window.scrollTo(0,0);
    await loadAllData();
    buildTabs();
    switchTab('employees');
  } else {
    const err = document.getElementById('loginErr');
    err.style.display = 'block';
    setTimeout(()=>err.style.display='none', 3000);
  }
}

async function loadAllData() {
  const [empRes, noticeRes] = await Promise.all([
    apiCall('getAllEmployees'),
    apiCall('getNotices'),
  ]);
  if (empRes.ok && empRes.employees) ALL_EMPLOYEES = empRes.employees;
  if (noticeRes.ok && noticeRes.notices) ALL_NOTICES = noticeRes.notices;
}

function doLogout() {
  document.getElementById('appScreen').classList.remove('on');
  document.getElementById('loginScreen').classList.add('on');
  document.getElementById('adminPass').value = '';
  ALL_EMPLOYEES = []; ALL_NOTICES = [];
}

// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
const TABS = [
  {id:'employees', ico:'👥', lbl:'Employees'},
  {id:'monthly',   ico:'📅', lbl:'Monthly'},
  {id:'notices',   ico:'📢', lbl:'Notices'},
  {id:'broadcast', ico:'📣', lbl:'Broadcast'},
  {id:'whatsapp',  ico:'📲', lbl:'WhatsApp'},
];

function buildTabs() {
  document.getElementById('tabInner').innerHTML = TABS.map(t =>
    `<button class="tbtn" id="tb-${t.id}" onclick="switchTab('${t.id}')">
      <span class="tico">${t.ico}</span>${t.lbl}
    </button>`
  ).join('');
}

function switchTab(id) {
  if (curTab === id) return;
  curTab = id;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('tb-'+id)?.classList.add('on');
  const el = document.getElementById('pageContent');
  el.innerHTML = '';
  el.scrollTop = 0;
  window.scrollTo({top:0,behavior:'instant'});
  ({employees:pgEmployees, monthly:pgMonthly, notices:pgNotices, broadcast:pgBroadcast, whatsapp:pgWhatsApp})[id]?.(el);
}

function pgEmployees(el) {
  el.innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="btn-teal" style="flex:1;padding:11px" onclick="showAddEmployee()">➕ Add Employee</button>
    </div>
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input class="search-bar" id="empSearch" placeholder="Search by name, code or branch…" oninput="filterEmployees()">
    </div>
    <div id="empList"></div>
  `;
  renderEmployeeList(ALL_EMPLOYEES);
}

function filterEmployees() {
  const q = document.getElementById('empSearch').value.toLowerCase();
  const filtered = ALL_EMPLOYEES.filter(e =>
    (e.name||'').toLowerCase().includes(q) ||
    (e.code||'').toLowerCase().includes(q) ||
    (e.branch||'').toLowerCase().includes(q)
  );
  renderEmployeeList(filtered);
}

function renderEmployeeList(list) {
  const el = document.getElementById('empList');
  if (!el) return;
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-ico">👥</div><div class="empty-txt">No employees found</div></div>`;
    return;
  }
  el.innerHTML = list.map(e => `
    <div class="emp-card">
      <div class="emp-avatar">${(e.name||'?')[0]}</div>
      <div class="emp-info">
        <div class="emp-name">${e.name||'—'}</div>
        <div class="emp-code">${e.code||'—'} · ${e.loanNo||'—'}</div>
        <div class="emp-branch">📍 ${e.branch||'—'} · ${e.designation||'—'}</div>
      </div>
      <div class="emp-actions">
        <button class="btn-icon edit" onclick="showEditEmployee('${e.code}')">✏️</button>
        <button class="btn-icon del"  onclick="confirmDeleteEmployee('${e.code}','${e.name}')">🗑️</button>
      </div>
    </div>
  `).join('');
}

function showAddEmployee() {
  editingEmp = null;
  openModal('➕ Add New Employee', buildEmpForm({}));
}

function showEditEmployee(code) {
  const emp = ALL_EMPLOYEES.find(e=>e.code===code);

function gv(id) { return document.getElementById('ef-'+id)?.value?.trim()||''; }

async function saveEmployee() {
  const empData = {
    code:gv('code'), name:gv('name'), custId:gv('custId'), loanNo:gv('loanNo'),
    branch:gv('branch'), designation:gv('designation'), doj:gv('doj'), dob:gv('dob'),
    mobile:gv('mobile'), whatsapp:gv('whatsapp'), email:gv('email'),
    origAmt:gv('origAmt'), emi:gv('emi'), rate:gv('rate'), loanStart:gv('loanStart'),
    shareAmt:gv('shareAmt'), shareDed:gv('shareDed'),
  };
  if (!empData.code || !empData.name) { showToast('❌ Code and Name required','err'); return; }
  const action = editingEmp ? 'updateEmployee' : 'addEmployee';
  const res = await apiCall(action, { employee: empData });
  if (res.ok) {
    showToast(editingEmp ? '✅ Employee updated!' : '✅ Employee added!', 'ok');
    closeModal();
    await loadAllData();
    pgEmployees(document.getElementById('pageContent'));
  } else {
    showToast('❌ Failed: '+(res.message||res.error), 'err');
  }
}

async function confirmDeleteEmployee(code, name) {
  openModal('🗑️ Delete Employee', `
    <p style="font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:20px">
      Are you sure you want to delete <strong>${name}</strong> (${code})?<br>
      <span style="color:var(--redfg);font-weight:700">This cannot be undone!</span>
    </p>
    <div class="btn-row">
      <button class="btn-danger" onclick="deleteEmployee('${code}')">🗑️ Yes, Delete</button>
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  `);
}

async function deleteEmployee(code) {
  const res = await apiCall('deleteEmployee', { empCode: code });
  if (res.ok) {
    showToast('✅ Employee deleted!', 'ok');
    closeModal();
    await loadAllData();
    pgEmployees(document.getElementById('pageContent'));
  } else {
    showToast('❌ Failed: '+(res.message||res.error), 'err');
  }
}

function pgMonthly(el) {
  const now = new Date();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const curMonth = months[now.getMonth()]+'-'+String(now.getFullYear()).slice(2);

  el.innerHTML = `
    <div class="form-card">
      <div class="form-title">📅 Monthly EMI Data Entry</div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px">
        <div>
          <label class="form-label">Select Month</label>
          <select class="form-inp" id="monthSel" style="min-width:160px">
            ${months.map((m,i)=>{
              const yr = i>=3 ? String(now.getFullYear()).slice(2) : String(now.getFullYear()+1).slice(2);
              const opt = m+'-'+yr;
              return `<option ${opt===curMonth?'selected':''}>${opt}</option>`;
            }).join('')}
          </select>
        </div>
        <div style="margin-top:18px">
          <button class="btn-primary" onclick="saveMonthlyData()">💾 Save All</button>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table class="month-table">
          <thead>
            <tr>
              <th style="text-align:left;padding-left:12px">Employee</th>
              <th>Prev Bal</th>
              <th>Total EMI</th>
              <th>Share Ded</th>
              <th>Principal</th>
              <th>Interest</th>
              <th>Balance</th>
            </tr>
          </thead>
          <tbody id="monthlyBody">
            ${ALL_EMPLOYEES.map((e,i)=>`
              <tr>
                <td>
                  <div class="emp-name-cell">${e.name||'—'}</div>
                  <div class="emp-code-cell">${e.code||''}</div>
                </td>
                ${['prevBal','totalEmi','shareDed','principal','interest','balance'].map(f=>`
                  <td><input class="month-inp" id="m-${e.code}-${f}" type="number" placeholder="0" value="${e.shareDed&&f==='shareDed'?e.shareDed:e.emi&&f==='totalEmi'?e.emi:''}"></td>
                `).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

async function saveMonthlyData() {
  const month = document.getElementById('monthSel')?.value;
  if (!month) return;
  const entries = ALL_EMPLOYEES.map(e => {
    const gm = f => parseFloat(document.getElementById(`m-${e.code}-${f}`)?.value||'0')||0;
    return {
      empCode: e.code, loanNo: e.loanNo, name: e.name, month,
      prevBal: gm('prevBal'), totalEmi: gm('totalEmi'), shareDed: gm('shareDed'),
      principal: gm('principal'), interest: gm('interest'), balance: gm('balance'),
    };
  }).filter(e => e.balance > 0);

  if (!entries.length) { showToast('❌ No data entered','err'); return; }
  const res = await apiCall('saveMonthlyData', { entries });
  if (res.ok) showToast(`✅ ${month} data saved for ${entries.length} employees!`, 'ok');
  else showToast('❌ Failed: '+(res.message||res.error), 'err');
}

    <div id="noticeList"></div>
  `;

}

function renderNotices() {
  const el = document.getElementById('noticeList');
  if (!el) return;
  if (!ALL_NOTICES.length) {
    el.innerHTML = `<div class="empty"><div class="empty-ico">📢</div><div class="empty-txt">No notices yet</div></div>`;
    return;
  }
  const sorted = [...ALL_NOTICES].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
  el.innerHTML = sorted.map(n=>`
    <div class="notice-item ${n.pinned?'pinned':''}">
      <div class="notice-top">
        <div class="notice-title-txt">${n.pinned?'📌 ':''}${n.title}</div>
        <div class="notice-actions">
          <button class="pin-btn ${n.pinned?'active':''}" onclick="togglePin('${n.id}')">
            ${n.pinned?'📌 Unpin':'📌 Pin'}
          </button>
          <button class="btn-icon del" style="width:30px;height:30px" onclick="deleteNotice('${n.id}')">🗑️</button>
        </div>
      </div>
      <div class="notice-body-txt">${n.body}</div>
      <div class="notice-meta">🗓️ ${n.date} · By ${n.postedBy||'Admin'}</div>
    </div>
  `).join('');
}

function showAddNotice() {
  openModal('➕ Add Notice', `
    <div class="form-group">
      <label class="form-label">Title</label>
      <input class="form-inp" id="n-title" placeholder="Notice title…">
    </div>
    <div class="form-group">
      <label class="form-label">Content</label>
      <textarea class="msg-area" id="n-body" placeholder="Notice content…" style="min-height:90px"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Date</label>
      <input class="form-inp" id="n-date" type="date" value="${new Date().toISOString().split('T')[0]}">
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <input type="checkbox" id="n-pinned" style="width:18px;height:18px">
      <label for="n-pinned" style="font-size:13px;font-weight:600">📌 Pin this notice</label>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="saveNotice()">➕ Add Notice</button>
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  `);
}

async function saveNotice() {
  const title  = document.getElementById('n-title')?.value?.trim();
  const body   = document.getElementById('n-body')?.value?.trim();
  const date   = document.getElementById('n-date')?.value;
  const pinned = document.getElementById('n-pinned')?.checked;
  if (!title || !body) { showToast('❌ Title and content required','err'); return; }
  const d = new Date(date);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const fmtDate = String(d.getDate()).padStart(2,'0')+'-'+months[d.getMonth()]+'-'+d.getFullYear();
  const res = await apiCall('addNotice', { title, body, date:fmtDate, pinned });
  if (res.ok) {
    showToast('✅ Notice added!','ok');
    closeModal();
    const r2 = await apiCall('getNotices');
    if (r2.ok) ALL_NOTICES = r2.notices;
    pgNotices(document.getElementById('pageContent'));
  } else showToast('❌ Failed','err');
}

async function togglePin(id) {
  const n = ALL_NOTICES.find(x=>x.id===id);
  if (!n) return;
  const res = await apiCall('updateNotice', { id, pinned: !n.pinned });
  if (res.ok) {
    n.pinned = !n.pinned;
    renderNotices();
    showToast(n.pinned?'📌 Pinned!':'Unpinned!','ok');
  }
}

async function deleteNotice(id) {
  const res = await apiCall('deleteNotice', { id });
  if (res.ok) {
    ALL_NOTICES = ALL_NOTICES.filter(n=>n.id!==id);
    renderNotices();
    showToast('✅ Notice deleted!','ok');
  } else showToast('❌ Failed','err');
}

let bcSelected = new Set();

function setBType(type, el) {
  document.querySelectorAll('.btype-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  const tmplArea = document.getElementById('tmplArea');
  const tmplLabel = document.getElementById('tmplLabel');
  if (type === 'custom') {
    tmplArea.style.display = 'none';
    tmplLabel.style.display = 'none';
  } else {
    tmplArea.style.display = 'grid';
    tmplLabel.style.display = 'block';
    tmplArea.innerHTML = (TEMPLATES[type]||[]).map(t=>
      `<button class="tmpl-btn" onclick="setMsg(this.dataset.msg)" data-msg="${t.replace(/"/g,'&quot;')}">${t.substring(0,40)}…</button>`
    ).join('');
  }
}

function setMsg(msg) {
  const el = document.getElementById('broadcastMsg');
  if (el) el.value = msg;
}

function selectAllBroadcast(sel) {
  ALL_EMPLOYEES.forEach(e => {
    const el = document.getElementById('bc-'+e.code);
    if (sel) { bcSelected.add(e.code); if(el){el.classList.add('checked');el.textContent='✓';} }
    else { bcSelected.delete(e.code); if(el){el.classList.remove('checked');el.textContent='';} }
  });
  document.getElementById('bcCount').textContent = bcSelected.size + ' selected';
}

function toggleBCEmp(code, el) {
  if (bcSelected.has(code)) { bcSelected.delete(code); el.classList.remove('checked'); el.textContent=''; }
  else { bcSelected.add(code); el.classList.add('checked'); el.textContent='✓'; }
  document.getElementById('bcCount').textContent = bcSelected.size + ' selected';
}

function sendBroadcast() {
  const msg = document.getElementById('broadcastMsg')?.value?.trim();
  if (!msg) { showToast('❌ Type a message first','err'); return; }
  const selected = ALL_EMPLOYEES.filter(e => bcSelected.has(e.code) && (e.whatsapp||e.mobile));
  if (!selected.length) { showToast('❌ No employees with phone numbers selected','err'); return; }
  bcQueue = selected; bcIdx = 0;
  sendNextBroadcast(msg);
}

function sendNextBroadcast(msg) {
  if (bcIdx >= bcQueue.length) { showToast(`✅ Sent to ${bcQueue.length} employees!`,'ok'); return; }
  const e = bcQueue[bcIdx];
  const phone = (e.whatsapp||e.mobile||'').replace(/\D/g,'');
  const fullMsg = `*${msg}*\n\n_BDCCB ಉದ್ಯೋಗಿ ಸಹಕಾರ ಸಂಘ_`;
  window.open('https://wa.me/91'+phone+'?text='+encodeURIComponent(fullMsg));
  bcIdx++;
  setTimeout(()=>sendNextBroadcast(msg), 2000);
}

// ═══════════════════════════════════════════
// WHATSAPP STATEMENT TAB
// ═══════════════════════════════════════════
function pgWhatsApp(el) {
  selectedWA = new Set();
  el.innerHTML = `
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <button class="select-all-btn" onclick="selectAll(true)">✅ Select All</button>
      <button class="select-all-btn" style="background:#f0f4f9;color:var(--muted)" onclick="selectAll(false)">❌ Deselect</button>
    </div>
    <div id="waList">
      ${ALL_EMPLOYEES.map(e=>`
        <div class="wa-emp-item">
          <div class="wa-check" id="wa-${e.code}" onclick="toggleWA('${e.code}',this)">  </div>
          <div class="wa-info">
            <div class="wa-name">${e.name||'—'}</div>
            <div class="wa-phone">📱 ${e.whatsapp||e.mobile||'No number'} · ${e.loanNo||''}</div>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="wa-bottom-bar">
      <div class="wa-count" id="waCount">0 selected</div>
      <button class="send-wa-btn" onclick="sendStatements()">📲 Send Statements</button>
    </div>
  `;
}

function toggleWA(code, el) {
  if (selectedWA.has(code)) { selectedWA.delete(code); el.classList.remove('checked'); el.textContent='  '; }
  else { selectedWA.add(code); el.classList.add('checked'); el.textContent='✓'; }
  document.getElementById('waCount').textContent = selectedWA.size + ' selected';
}

function selectAll(sel) {
  ALL_EMPLOYEES.forEach(e => {
    const el = document.getElementById('wa-'+e.code);
    if (sel) { selectedWA.add(e.code); if(el){el.classList.add('checked');el.textContent='✓';} }
    else { selectedWA.delete(e.code); if(el){el.classList.remove('checked');el.textContent='  ';} }
  });
  document.getElementById('waCount').textContent = selectedWA.size + ' selected';
}

let waQueue = []; let waIdx = 0;
async function sendStatements() {
  const selected = ALL_EMPLOYEES.filter(e => selectedWA.has(e.code));
  if (!selected.length) { showToast('❌ Select at least one employee','err'); return; }
  waQueue = selected; waIdx = 0;
  sendNextStatement();
}

async function sendNextStatement() {
  if (waIdx >= waQueue.length) { showToast(`✅ Sent to ${waQueue.length} employees!`,'ok'); return; }
  const e = waQueue[waIdx];
  const phone = (e.whatsapp||e.mobile||'').replace(/\D/g,'');
  if (!phone) { waIdx++; sendNextStatement(); return; }
  // Fetch history for this employee
  const res = await apiCall('getHistory', { empCode: e.code });
  const hist = (res.ok && res.history) ? res.history.sort((a,b)=>b.month>a.month?1:-1).slice(0,3) : [];
  let msg = `🏦 *BDCCB ಉದ್ಯೋಗಿ ಸಹಕಾರ ಸಂಘ*\n*ಸಾಲ ವಿವರ — ${e.name}*\nEmp Code: ${e.code} | Loan: ${e.loanNo||'—'}\n\n`;
  hist.forEach(h => {
    msg += `📅 *${h.month}*\n  Balance: ₹${fmt(h.balance)}\n  EMI: ₹${fmt(h.totalEmi)} | Share: ₹${fmt(h.shareDed)} | Principal: ₹${fmt(h.principal)} | Interest: ₹${fmt(h.interest)}\n\n`;
  });
  msg += `_BDCCB Society Portal ನಿಂದ ರಚಿಸಲಾಗಿದೆ_`;
  window.open('https://wa.me/91'+phone+'?text='+encodeURIComponent(msg));
  waIdx++;
  setTimeout(sendNextStatement, 2500);
}

// ═══════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════
function openModal(title, body) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function fmt(n) { return Number(n||0).toLocaleString('en-IN'); }

let _tt;
function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast '+type+' on';
  clearTimeout(_tt); _tt = setTimeout(()=>t.classList.remove('on'), 3500);
}
</script>
