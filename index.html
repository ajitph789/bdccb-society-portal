<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>BDCCB � Employee Society Portal V3</title>

<style>
:root{
  --navy:#0d1f3c;--navy2:#163258;--navy3:#1e4278;
  --gold:#c9941a;--gold2:#e4a820;--gold3:#f5c842;--goldp:#fffbec;
  --teal:#065f46;--teal2:#047857;--teal3:#10b981;--tealp:#ecfdf5;
  --red:#b91c1c;--redbg:#fef2f2;--redfg:#dc2626;
  --blue:#1d4ed8;--bluebg:#eff6ff;--bluefg:#3b82f6;
  --purple:#6d28d9;--purplebg:#f5f3ff;
  --bg:#f0f4f9;--card:#fff;--border:#dde4ef;
  --ink:#0d1f3c;--muted:#5a6b84;--sub:#8899b0;
  --sh:0 1px 4px rgba(13,31,60,.07);
  --sh2:0 4px 18px rgba(13,31,60,.11);
  --sh3:0 8px 32px rgba(13,31,60,.16);
  --r:16px;--r2:12px;--r3:8px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100dvh;overflow-x:hidden}

.screen{display:none}
.screen.on{display:flex;flex-direction:column;min-height:100dvh}
#loginScreen.on{display:flex!important;align-items:center;justify-content:center}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes progressFill{from{width:0}to{width:var(--w)}}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

/* -- LOGIN -- */
#loginScreen{
  background:linear-gradient(150deg,#060e1c 0%,#0d1f3c 45%,#0a2040 75%,#061228 100%);
  padding:24px 20px;position:relative;overflow:hidden;
}
#loginScreen::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 15% 25%,rgba(201,148,26,.08) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 75%,rgba(6,95,70,.1) 0%,transparent 55%);
  pointer-events:none;
}
.login-card{
  background:#fff;border-radius:28px;width:100%;max-width:400px;
  position:relative;z-index:1;
  box-shadow:0 4px 6px rgba(0,0,0,.05),0 40px 100px rgba(0,0,0,.55);
  animation:fadeUp .5s cubic-bezier(.22,.68,0,1.15);overflow:hidden;
}
.login-top{
  background:linear-gradient(160deg,#0a2342 0%,#1a4a7a 50%,#0d6e6e 100%);
  padding:40px 28px 32px;text-align:center;position:relative;overflow:hidden;
}
.login-top::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(255,255,255,.08) 0%,transparent 65%);
}
.login-top::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#0d6e6e,var(--gold3),#0d6e6e);
}
.login-ico{
  width:76px;height:76px;
  background:linear-gradient(135deg,rgba(255,255,255,.2),rgba(255,255,255,.05));
  border:2px solid rgba(255,255,255,.25);border-radius:22px;
  font-size:36px;display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;box-shadow:0 8px 30px rgba(0,0,0,.3);
  position:relative;
}
.login-title{font-size:18px;font-weight:900;color:#fff;margin-bottom:6px;letter-spacing:-.3px}
.login-sub{font-size:10px;color:rgba(255,255,255,.5);font-weight:600;text-transform:uppercase;letter-spacing:.1em;line-height:1.5}
.login-body{padding:28px 28px 28px}
.fld{margin-bottom:20px}
.fld label{display:block;font-size:11px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.inp-wrap{position:relative}
.inp-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:17px;pointer-events:none}
.inp{
  width:100%;border:2px solid #e2e8f0;border-radius:14px;
  padding:15px 14px 15px 46px;font-family:var(--font);font-size:15px;font-weight:700;
  color:var(--ink);background:#f8fafc;outline:none;transition:.2s;-webkit-appearance:none;
}
.inp::placeholder{font-size:13px;font-weight:400;color:#94a3b8}
.inp:focus{border-color:#0d6e6e;box-shadow:0 0 0 4px rgba(13,110,110,.1);background:#fff}
.login-btn{
  width:100%;background:linear-gradient(135deg,#0a2342,#1a4a7a);
  color:#fff;border:none;border-radius:14px;padding:16px;
  font-family:var(--font);font-size:15px;font-weight:800;
  cursor:pointer;transition:.2s;margin-top:4px;
  box-shadow:0 6px 20px rgba(10,35,66,.35);letter-spacing:.02em;
}
.login-btn:hover{background:linear-gradient(135deg,#0d2d52,#1e5490);transform:translateY(-1px)}
.login-btn:active{transform:scale(.98)}
.login-btn:disabled{opacity:.7}
.login-err{background:#fef2f2;border:1.5px solid #fecaca;border-radius:12px;padding:12px 16px;font-size:12.5px;color:#dc2626;font-weight:700;text-align:center;margin-top:14px;display:none}

/* -- APP SHELL -- */
#appScreen{background:var(--bg)}
.app-header{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 55%,var(--teal) 100%);
  padding:11px 16px 10px;border-bottom:3px solid var(--gold3);
  box-shadow:0 2px 20px rgba(0,0,0,.3);
  position:sticky;top:0;z-index:200;flex-shrink:0;
}
.app-hinner{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:8px}
.app-htitle{display:flex;align-items:center;gap:11px}
.app-hico{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gold3));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 10px rgba(0,0,0,.25);flex-shrink:0}
.app-htext h1{font-size:14px;font-weight:800;color:#fff;line-height:1.2}
.app-htext p{font-size:10px;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.08em}
.hbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.8);border-radius:9px;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)}
.hbtn.danger{background:rgba(220,38,38,.15);border-color:rgba(220,38,38,.25);color:#fca5a5}

/* TAB BAR */
.tab-bar{
  background:linear-gradient(135deg,#0a1929,var(--navy));
  border-bottom:1px solid rgba(201,148,26,.2);
  position:sticky;top:59px;z-index:199;
  overflow-x:auto;scrollbar-width:none;flex-shrink:0;
}
.tab-bar::-webkit-scrollbar{display:none}
.tab-inner{display:flex;padding:0 8px;min-width:max-content}
.tbtn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:9px 14px 8px;border:none;background:none;
  color:rgba(255,255,255,.4);font-family:var(--font);
  font-size:11px;font-weight:700;cursor:pointer;
  border-bottom:3px solid transparent;transition:.15s;
  white-space:nowrap;text-transform:uppercase;letter-spacing:.04em;
}
.tbtn .tico{font-size:18px;transition:.15s}
.tbtn.on{color:var(--gold3);border-bottom-color:var(--gold3)}
.tbtn.on .tico{transform:scale(1.1)}

.page-content{flex:1;overflow-y:auto;padding:16px;max-width:720px;margin:0 auto;width:100%;padding-bottom:40px}

/* -- CARDS -- */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh2);overflow:hidden;margin-bottom:14px}

/* -- MY LOAN -- */
.loan-hero{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 50%,var(--teal) 100%);
  border-radius:var(--r);padding:22px 20px;margin-bottom:14px;
  position:relative;overflow:hidden;box-shadow:0 4px 24px rgba(13,31,60,.25);
  animation:fadeUp .4s ease;
}
.loan-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none}
.hero-label{font-size:11px;color:rgba(255,255,255,.5);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.hero-name{font-size:20px;font-weight:900;color:#fff;margin-bottom:18px;line-height:1.2}
.hero-bal-wrap{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:16px 18px;margin-bottom:16px}
.hero-bal-label{font-size:10px;color:rgba(255,255,255,.45);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.hero-bal{font-size:30px;font-weight:900;color:#fff;letter-spacing:-.5px;font-family:monospace}
.hero-bal span{font-size:16px;font-weight:600;color:rgba(255,255,255,.6);margin-right:2px}
.prog-wrap{margin-top:12px}
.prog-bar{height:7px;background:rgba(255,255,255,.12);border-radius:20px;overflow:hidden;margin-bottom:6px}
.prog-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--teal3),var(--gold3));animation:progressFill .8s ease .2s both;--w:0%}
.prog-labels{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.4);font-weight:600}
.prog-pct{color:var(--gold3);font-weight:900}
.hero-chips{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.hero-chip{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 12px;text-align:center}
.hero-chip-label{font-size:9px;color:rgba(255,255,255,.4);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.hero-chip-val{font-size:15px;font-weight:800;color:#fff}
.hero-chip-sub{font-size:9.5px;color:rgba(255,255,255,.35);margin-top:2px}

.sec-title{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:16px 0 8px;padding-left:2px}
.info-list{padding:4px 0}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-key{font-size:12.5px;color:var(--muted);font-weight:600}
.info-val{font-size:13.5px;font-weight:700;color:var(--ink);text-align:right}
.info-val.mono{font-family:monospace}
.badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700}
.badge.blue{background:var(--bluebg);color:var(--blue)}
.badge.gold{background:var(--goldp);color:var(--gold)}
.badge.teal{background:var(--tealp);color:var(--teal)}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:var(--r2);box-shadow:var(--sh);padding:14px;animation:popIn .3s ease both}
.stat-ico{font-size:22px;margin-bottom:6px}
.stat-label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.stat-val{font-size:18px;font-weight:900;color:var(--ink)}
.stat-val small{font-size:11px;font-weight:600;color:var(--muted)}
.stat-sub{font-size:10.5px;color:var(--sub);margin-top:3px}

.clearance-card{
  background:linear-gradient(135deg,var(--teal),var(--teal2));
  border-radius:var(--r);padding:18px 20px;margin-bottom:14px;text-align:center;
}
.clearance-title{font-size:11px;color:rgba(255,255,255,.6);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.clearance-date{font-size:22px;font-weight:900;color:#fff;margin-bottom:4px}
.clearance-sub{font-size:11.5px;color:rgba(255,255,255,.5)}

/* -- HISTORY -- */
.hist-filters{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:12px;box-shadow:var(--sh)}
.filter-row{display:flex;gap:8px;flex-wrap:wrap}
.filter-chip{font-size:13px!important;
  padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);
  background:#fff;font-family:var(--font);font-size:12px;font-weight:700;
  color:var(--muted);cursor:pointer;transition:.15s;white-space:nowrap;
}
.filter-chip.on{background:var(--navy);border-color:var(--navy);color:#fff}
.date-inp{
  border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;
  font-family:var(--font);font-size:12px;color:var(--ink);
  background:#fff;outline:none;
}
.date-inp:focus{border-color:var(--gold2)}

.hist-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.action-btn{
  padding:13px;border-radius:var(--r2);border:none;
  font-family:var(--font);font-size:13px;font-weight:800;cursor:pointer;transition:.15s;
}
.action-btn.green{background:var(--tealp);color:var(--teal);border:1.5px solid rgba(6,95,70,.2)}
.action-btn.gold{background:var(--goldp);color:var(--gold);border:1.5px solid rgba(201,148,26,.2)}
.action-btn:active{transform:scale(.97)}

.hist-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.hs-card{background:var(--card);border-radius:var(--r2);padding:12px 8px;text-align:center;box-shadow:var(--sh)}
.hs-label{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.hs-val{font-size:14px;font-weight:900;color:var(--ink)}
.hs-val.green{color:var(--teal2)}
.hs-val.red{color:var(--redfg)}

.hist-card{background:var(--card);border-radius:var(--r2);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden;animation:fadeUp .3s ease}
.hist-card-top{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 16px;border-bottom:1px solid var(--border)}
.hist-month{font-size:16px;font-weight:900;color:var(--ink)}
.hist-prev{font-size:12px;color:var(--sub);margin-top:3px}
.hist-bal-wrap{text-align:right}
.hist-bal{font-size:16px;font-weight:900;color:var(--ink);font-family:monospace}
.hist-change{font-size:11px;font-weight:700;margin-top:3px}
.hist-change.down{color:var(--teal2)}

.hist-card-bot{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border)}
.hist-chip{padding:10px 6px;text-align:center;border-right:1px solid var(--border)}
.hist-chip:last-child{border-right:none}
.hist-chip-label{font-size:10px;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.hist-chip-val{font-size:13px;font-weight:800;color:var(--ink)}
.hist-chip-val.p{color:var(--teal2)}
.hist-chip-val.i{color:var(--gold)}
.hist-chip-val.s{color:var(--blue)}

.empty{text-align:center;padding:48px 20px}
.empty-ico{font-size:48px;margin-bottom:12px}
.empty-txt{font-size:14px;color:var(--muted);font-weight:600}

/* -- PROFILE -- */
/* -- PROFILE -- */
.prof-layout{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
@media(max-width:600px){.prof-layout{grid-template-columns:1fr}}

/* Left panel � view only */
.prof-left{display:flex;flex-direction:column;gap:0}
.prof-id-card{
  background:linear-gradient(145deg,var(--navy),var(--navy2));
  border-radius:var(--r);padding:20px;margin-bottom:12px;
  box-shadow:0 4px 24px rgba(13,31,60,.25);animation:fadeUp .4s ease;
  position:relative;overflow:hidden;
}
.prof-id-card::before{
  content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;
  border-radius:50%;background:rgba(201,148,26,.08);pointer-events:none;
}
.prof-avatar{
  width:58px;height:58px;border-radius:14px;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:900;color:var(--navy);
  box-shadow:0 4px 14px rgba(0,0,0,.25);margin-bottom:12px;
}
.prof-name{font-size:17px;font-weight:900;color:#fff;line-height:1.3;margin-bottom:2px}
.prof-code{font-size:10.5px;color:rgba(255,255,255,.4);font-family:monospace;font-weight:600;margin-bottom:10px}
.prof-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.ptag{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:3px 8px;font-size:9.5px;font-weight:700;color:rgba(255,255,255,.65)}
.service-badge{
  background:linear-gradient(135deg,var(--teal),var(--teal2));
  border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:8px;
}
.sb-ico{font-size:18px}
.sb-text{font-size:11px;font-weight:800;color:#fff}
.sb-sub{font-size:9.5px;color:rgba(255,255,255,.55);margin-top:1px}

/* Info rows in left panel */
.info-panel{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);margin-bottom:12px}
.info-panel-title{
  background:linear-gradient(135deg,var(--navy),var(--navy2));
  padding:10px 14px;font-size:10px;font-weight:800;
  color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.07em;
  display:flex;align-items:center;gap:6px;
}
.ip-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border)}
.ip-row:last-child{border-bottom:none}
.ip-key{font-size:11px;color:var(--muted);font-weight:500}
.ip-val{font-size:12px;font-weight:700;color:var(--ink);text-align:right;font-family:monospace}
.ip-badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10.5px;font-weight:700}
.ip-badge.blue{background:var(--bluebg);color:var(--blue)}
.ip-badge.gold{background:var(--goldp);color:var(--gold)}
.ip-badge.teal{background:var(--tealp);color:var(--teal)}

/* Right panel � editable form */
.prof-right{background:var(--card);border-radius:var(--r);box-shadow:var(--sh2);overflow:hidden;animation:fadeUp .4s ease .1s both}
.prof-form-header{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  padding:14px 18px;display:flex;align-items:center;gap:10px;
}
.pfh-ico{font-size:20px}
.pfh-title{font-size:13px;font-weight:800;color:var(--navy)}
.pfh-sub{font-size:10px;color:rgba(13,31,60,.55);margin-top:1px}
.prof-form-body{padding:16px}
.pf-group{margin-bottom:14px}
.pf-group-label{
  font-size:9.5px;font-weight:800;color:var(--muted);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;
  display:flex;align-items:center;gap:5px;
}
.pf-editable-tag{
  background:var(--tealp);color:var(--teal2);
  border-radius:4px;padding:1px 6px;font-size:8px;font-weight:800;
}
.pf-locked-tag{
  background:var(--bluebg);color:var(--blue);
  border-radius:4px;padding:1px 6px;font-size:8px;font-weight:700;
}
.pf-field-row{
  background:#f8fafc;border:1.5px solid var(--border);border-radius:10px;
  padding:10px 12px;display:flex;align-items:center;justify-content:space-between;
  gap:8px;transition:.15s;
}
.pf-field-row.editing{border-color:var(--gold2);background:var(--goldp)}
.pf-field-val{font-size:13px;font-weight:600;color:var(--ink);flex:1}
.pf-field-val.empty{color:var(--sub);font-style:italic;font-size:12px}
.pf-edit-btn{
  background:#fff;border:1.5px solid rgba(201,148,26,.3);
  border-radius:8px;padding:5px 11px;
  font-family:var(--font);font-size:10.5px;font-weight:800;
  color:var(--gold);cursor:pointer;flex-shrink:0;transition:.15s;
  white-space:nowrap;
}
.pf-edit-btn:hover{background:var(--goldp);border-color:var(--gold)}
.pf-edit-inp{
  width:100%;border:1.5px solid var(--gold2);border-radius:8px;
  padding:8px 10px;font-family:var(--font);font-size:13px;
  color:var(--ink);outline:none;background:var(--goldp);margin-top:6px;
}
.pf-save-row{display:flex;gap:6px;margin-top:7px}
.pf-save-btn{
  background:var(--teal);color:#fff;border:none;border-radius:8px;
  padding:7px 14px;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;
}
.branch-sel{
  flex:1;border:1.5px solid rgba(201,148,26,.35);border-radius:10px;
  padding:10px 12px;font-family:var(--font);font-size:13px;font-weight:600;
  color:var(--ink);background:var(--goldp);outline:none;cursor:pointer;
  width:100%;
}
.branch-sel:focus{border-color:var(--gold2);box-shadow:0 0 0 3px rgba(201,148,26,.1)}
.pf-cancel-btn{
  background:#fff;color:var(--muted);border:1.5px solid var(--border);

const API_URL = 'https://script.google.com/macros/s/AKfycbw9CafvWtWUjl6Q8YaUor5Wa3M159gex294Fm4qIz-YwtRah_Ztf8KG5xHp3s8POQI3/exec';
const APP_VERSION = 3.0;

// -------------------------------------------
// API CALL HELPER
// -------------------------------------------
async function apiCall(action, extraData = {}) {
  const body = JSON.stringify({ action, version: APP_VERSION, ...extraData });

  // Method 1: Direct POST (no Content-Type header = no CORS preflight)
  try {
    const res = await fetch(API_URL, { method:'POST', redirect:'follow', body });
    const json = JSON.parse(await res.text());
    if (json && json.ok !== undefined) return json;
  } catch(e1) { console.warn('M1:', e1.message); }

  // Method 2: corsproxy.io POST
  try {
    const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(API_URL), { method:'POST', body });
    const json = JSON.parse(await res.text());
    if (json && json.ok !== undefined) return json;
  } catch(e2) { console.warn('M2:', e2.message); }

  // Method 3: allorigins POST
  try {
    const res = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(API_URL), { method:'POST', body });
    const json = JSON.parse(await res.text());
    if (json && json.ok !== undefined) return json;
  } catch(e3) { console.warn('M3:', e3.message); }

  return { ok: false, error: 'network_error' };
}

async function doLogin() {
  const code = document.getElementById('empCode').value.trim().toUpperCase();
  if (!code) return;

  const btn = document.querySelector('.login-btn');
  btn.textContent = 'Logging in�'; btn.disabled = true;

  try {
    // Try API first
    const res = await apiCall('login', { empCode: code });

    if (res.blocked) {
      btn.textContent = 'Login ?'; btn.disabled = false;
      showLoginErr('?? Outdated version. Please open latest link.');
      return;
    }

    if (res.error === 'network_error') {
      // API failed � try demo data
      const emp = EMPLOYEES[code];
      if (!emp) {
        btn.textContent = 'Login ?'; btn.disabled = false;
        showLoginErr('? Invalid Employee Code. Please try again.');
        return;
      }
      loggedEmp = {...emp};
    } else if (!res.ok || !res.employee) {
      btn.textContent = 'Login ?'; btn.disabled = false;
      showLoginErr('? Invalid Employee Code. Please try again.');
      return;
    } else {
      // API success!
      loggedEmp = res.employee;
      // Load history, board, notices in background
      apiCall('getHistory', { empCode: code }).then(r => {
        if (r.ok && r.history) HISTORY[code] = r.history;
      });
      apiCall('getBoard').then(r => {
        if (r.ok && r.board) BOARD.splice(0, BOARD.length, ...r.board);
      });
      apiCall('getNotices').then(r => {
        if (r.ok && r.notices) NOTICES.splice(0, NOTICES.length, ...r.notices);
      });
    }
  } catch(err) {
    // Any error � try demo data
    const emp = EMPLOYEES[code];
    if (!emp) {
      btn.textContent = 'Login ?'; btn.disabled = false;
      showLoginErr('? Invalid Employee Code. Please try again.');
      return;

    loggedEmp = {...emp};

  document.getElementById('loginScreen').classList.remove('on');

  app.classList.add('on');
  app.style.display = 'flex';
  setTimeout(() => { window.scrollTo({top:0,behavior:'instant'}); }, 10);
  switchTab('loan');
}

const MO_NUM = {APR:4,MAY:5,JUN:6,JUL:7,AUG:8,SEP:9,OCT:10,NOV:11,DEC:12,JAN:1,FEB:2,MAR:3};
function monthToNum(m) {
  const p = m.toUpperCase().split('-');
  const yr = 2000 + parseInt(p[1]||0);
  const mo = MO_NUM[p[0]] || 0;
  return yr * 100 + mo;
}
function sortedHist(code) {
  return [...(HISTORY[code]||[])].sort((a,b)=>monthToNum(b.month)-monthToNum(a.month));
}

function getFiltered() {
  const e = loggedEmp;
  const all = sortedHist(e.code);
  if (_histFilter === 'recent') return all.slice(0,3);
  if (_histFilter === 'yearly') {
    const sel = document.getElementById('yearSel')?.value || '2526';
    return all.filter(h => {
      const p = h.month.toUpperCase().split('-');
      const mo = p[0]; const yr = parseInt(p[1]);
      const aprilOnwards = ['APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      if (aprilOnwards.includes(mo)) return yr === parseInt(sel.slice(0,2));
      return yr === parseInt(sel.slice(2));
    });
  }
  return all;
}

function calcService(doj) {
  try {
    if (!doj) return '�';
    const str = doj.toString().trim();
    let start;
    const mo = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    // Format: DD-Mon-YYYY e.g. 01-Apr-2010
    if (/\d{2}-[A-Za-z]{3}-\d{4}/.test(str)) {
      const p = str.split('-');
      start = new Date(parseInt(p[2]), mo[p[1]], parseInt(p[0]));
    }
    // Format: DD/MM/YYYY e.g. 16/12/2020
    else if (/\d{1,2}\/\d{1,2}\/\d{4}/.test(str)) {
      const p = str.split('/');
      start = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
    }
    // Format: YYYY-MM-DD
    else if (/\d{4}-\d{2}-\d{2}/.test(str)) {
      start = new Date(str);
    }
    // Try generic parse
    else {
      start = new Date(str);
    }
    if (!start || isNaN(start.getTime())) return '�';
    const now = new Date();
    let y = now.getFullYear()-start.getFullYear();
    let m = now.getMonth()-start.getMonth();
    if(m<0){y--;m+=12;}
    if(y<0) return '�';
    if(y===0) return m+' month'+(m!==1?'s':'');
    if(m===0) return y+' year'+(y!==1?'s':'');
    return y+' yr'+(y!==1?'s':'')+' '+m+' mo';
  } catch(e){ return '�'; }
}

function eBranchRow(val) {

function saveBranchDrop(val) {
  if(!val) return;
  loggedEmp.branch = val;
  const tags = document.querySelectorAll('.ptag');
  if(tags[0]) tags[0].textContent = val;
  if (API_URL) {
    apiCall('updateProfile', { empCode: loggedEmp.code, updates: { 'Branch': val } });
  }
  showToast('? Branch updated!', 'ok');
}

function eRow(label, val, key, type='text') {
  const display = val || '';
  const isEmpty = !val || val === 'Not set';
  return `
    <div class="pf-group" id="grp-${key}">
      <div class="pf-group-label">
        ${label}
        <span class="pf-editable-tag">?? Editable</span>
      </div>
      <div class="pf-field-row" id="row-${key}">
        <span class="pf-field-val ${isEmpty?'empty':''}" id="fv-${key}">${isEmpty?'Not set':display}</span>
        <button class="pf-edit-btn" onclick="startEdit('${key}','${display}','${type}')">Edit</button>
      </div>
    </div>`;
}

function startEdit(key, cur, type='text') {
  const row = document.getElementById('row-'+key);
  const fv  = document.getElementById('fv-'+key);
  if(!row) return;
  row.classList.add('editing');
  fv.style.display = 'none';
  row.querySelector('.pf-edit-btn').style.display = 'none';

  const inp = document.createElement('div');
  inp.style.width = '100%';
  inp.innerHTML = `
    <input class="pf-edit-inp" id="ei-${key}" type="${type}"
      value="${cur === 'Not set' ? '' : cur}"
      placeholder="Enter ${key}..."
      onkeydown="if(event.key==='Enter')saveEdit('${key}');if(event.key==='Escape')cancelEdit('${key}','${cur}')">
    <div class="pf-save-row">
      <button class="pf-save-btn" onclick="saveEdit('${key}')">? Save</button>
      <button class="pf-cancel-btn" onclick="cancelEdit('${key}','${cur}')">Cancel</button>
    </div>`;
  row.appendChild(inp);
  setTimeout(() => document.getElementById('ei-'+key)?.focus(), 50);
}

async function saveEdit(key) {
  const inp = document.getElementById('ei-'+key);
  if(!inp) return;
  const val = inp.value.trim() || '';
  loggedEmp[key] = val;
  // Map JS key to sheet column header
  const fieldMap = {
    designation:'Designation', mobile:'Mobile', whatsapp:'WhatsApp',
    email:'Email', address:'Address', aadhar:'Aadhar Card No.', pan:'PAN Number'
  };
  const sheetField = fieldMap[key];
  if (sheetField && API_URL) {
    apiCall('updateProfile', { empCode: loggedEmp.code, updates: { [sheetField]: val } });
  }
  showToast('? '+key+' updated!','ok');
  renderProfile(document.getElementById('pageContent'));
}

function cancelEdit(key, orig) {
  renderProfile(document.getElementById('pageContent'));
}

function pgNotices(el) {
  if (!NOTICES.length) {
    el.innerHTML = `<div class="empty"><div class="empty-ico">??</div><div class="empty-txt">Notices loading...</div></div>`;
    apiCall('getNotices').then(r => {
      if (r.ok && r.notices) { NOTICES.splice(0,NOTICES.length,...r.notices); pgNotices(el); }
    });
    return;
  }
  const pinned = NOTICES.filter(n=>n.pinned);
  const others = NOTICES.filter(n=>!n.pinned);
  el.innerHTML = `
    ${pinned.length?`<div class="sec-title" style="margin-top:4px">?? Pinned</div>`:''}
    ${pinned.map(n=>noticeCard(n)).join('')}
    ${others.length?`<div class="sec-title">?? All Notices</div>`:''}
    ${others.map(n=>noticeCard(n)).join('')}
  `;
}

function fmt(n) { return Number(n).toLocaleString('en-IN'); }

function fmtDate(val) {
  if (!val) return '�';
  const str = val.toString().trim();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  // Already DD-Mon-YYYY
  if (/\d{2}-[A-Za-z]{3}-\d{4}/.test(str)) return str;
  // DD/MM/YYYY
  if (/\d{1,2}\/\d{1,2}\/\d{4}/.test(str)) {
    const p = str.split('/');
    return String(p[0]).padStart(2,'0') + '-' + months[parseInt(p[1])-1] + '-' + p[2];
  }
  try {
    const d = new Date(str);
    if (isNaN(d.getTime())) return str;
    return String(d.getDate()).padStart(2,'0') + '-' + months[d.getMonth()] + '-' + d.getFullYear();
  } catch(e) { return str; }
}

let _tt;
function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast '+type+' on';
  clearTimeout(_tt); _tt = setTimeout(()=>t.classList.remove('on'), 3000);
}
